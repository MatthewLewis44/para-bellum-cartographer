name: "para_bellum_belgium_test"
title: "PARA BELLUM"
subtitle: "Belgium OSM Test"
scenario: "1 January 1930"

bbox:
  min_lon: 2.5
  min_lat: 49.5
  max_lon: 6.4
  max_lat: 51.5

# 10km per hex — Para Bellum standard
hex_size_km: 10.0
river_scalerank_max: 8  # AD-029: NE rivers scalerank<=8 (Meuse/Scheldt) + OSM canals

designer_style: simonitch
font_scale: 1.0
dpi: 150

show_elevation_shading: true
show_rivers: true
show_cities: true
show_ports: true

output_formats: [png, html, json]
output_dir: ./output